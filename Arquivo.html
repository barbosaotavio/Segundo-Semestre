<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela de peso</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            text-align: center;
            margin-top: 50px;
        }

        h1 {
            color: #333;
        }

        form {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        label {
            display: block;
            margin-top: 10px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        a {
            display: block;
            margin-top: 15px;
            padding: 10px;
            background-color: #007BFF;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        a:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1> Calculador de IMC </h1>
    <form>
        <label>Peso (Kg)</label> <input type="number" id="v1">
        <label>altura(M)</label> <input type="number" id="v2">
        <a href="#" onclick="executar()">Executar</a>
    </form>
    <script src="Tabela de peso/arquivo.js"></script>
    <script>
        const executar = () => {
            const peso = eval(document.getElementById("v1").value);
            const altura = eval(document.getElementById("v2").value);
            const v_imc = imc(peso,altura);
            const v_sit = situacao(v_imc);
            alert(`IMC:${v_imc.toFixed(2)} :: Situção:${v_sit}`);

        }
    </script>
</body>
</html>
