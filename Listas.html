<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas</title>
</head>
<body>
    <p>Lista ordenadas!</p>
    
    <ol>
        <li>Primeiro item</li>
        <li>Segundo item</li>
        <li>Terceiro item</li>
        <li>Quarto item</li>
        <li>Quinto item</li>
    </ol>

    <p>Lista não ordenadas!</p>

    <ul>
        <li>Vernelho</li>
        <li>Verde</li>
        <li>Azul</li>
        <li>Amarelo</li>
        <li>Preto</li>
    </ul>
</body>
</html>
